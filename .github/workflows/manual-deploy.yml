name: Manual Deploy

on:
  workflow_dispatch:

env:
  PROJECT_ID: rscommendation-493408
  REGION: europe-west4
  AR_IMAGE: europe-west4-docker.pkg.dev/rscommendation-493408/backend/api
  CLOUD_RUN_SERVICE: rscommendation-api
  SERVICE_ACCOUNT: rscommendation-api@rscommendation-493408.iam.gserviceaccount.com

jobs:
  deploy:
    name: Build & Deploy to Cloud Run
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # Required for Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ env.AR_IMAGE }}:${{ github.sha }} \
            --tag ${{ env.AR_IMAGE }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.AR_IMAGE }}:${{ github.sha }}
          docker push ${{ env.AR_IMAGE }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --image ${{ env.AR_IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --service-account ${{ env.SERVICE_ACCOUNT }} \
            --set-env-vars GOOGLE_CLOUD_PROJECT=${{ env.PROJECT_ID }} \
            --allow-unauthenticated \
            --port 8000 \
            --quiet

      - name: Print service URL
        run: |
          gcloud run services describe ${{ env.CLOUD_RUN_SERVICE }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --format "value(status.url)"
